<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nature Weather App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#d0f0c0, #4caf50);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
      z-index: 1;
    }

    /* Sky container */
    .sky {
      position: absolute;
      top: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      z-index: 0;
    }

    /* Sun */
    .sun {
      position: absolute;
      top: 50px;
      right: 100px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at center, #ffeb3b, #fbc02d);
      border-radius: 50%;
      box-shadow: 0 0 30px #fff176;
    }

    /* Clouds */
    .cloud {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0.8;
      animation: floatCloud linear infinite;
    }

    .cloud1 {
      width: 100px;
      height: 60px;
      top: 100px;
      left: -150px;
      animation-duration: 40s;
    }

    .cloud2 {
      width: 120px;
      height: 70px;
      top: 150px;
      left: -200px;
      animation-duration: 60s;
    }

    @keyframes floatCloud {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(120vw);
      }
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px #2e7d32;
      z-index: 2;
    }

    .input-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      z-index: 2;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      background-color: #2e7d32;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #1b5e20;
    }

    .weather {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      max-width: 400px;
      z-index: 2;
    }

    .footer {
      position: absolute;
      bottom: 10px;
      text-align: center;
      font-size: 1rem;
      color: #ffffffcc;
      z-index: 2;
    }

    /* Raindrops */
    .raindrop {
      position: absolute;
      width: 2px;
      height: 15px;
      background: rgba(255, 255, 255, 0.5);
      top: -20px;
      animation: fall linear infinite;
      z-index: 0;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }
  </style>
</head>
<body>
  <!-- Sky with Sun and Clouds -->
  <div class="sky">
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
  </div>

  <!-- Main App Interface -->
  <h1>🌡️ Weather Forecast 🌦️</h1>
  <div class="input-container">
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button onclick="fetchWeather()">Search</button>
  </div>
  <div class="weather" id="weatherBox"></div>

  <!-- Footer Credit -->
  <div class="footer">Made with ❤️ by Siddharth</div>

  <!-- JavaScript -->
  <script>
    function fetchWeather() {
      const city = document.getElementById("cityInput").value;
      const url = `http://api.weatherapi.com/v1/current.json?key=70e342e9821d48f39de172815253105&q=${city}&aqi=yes`;

      fetch(url)
        .then(res => res.json())
        .then(data => {
          const box = document.getElementById("weatherBox");
          if (data.location) {
            box.innerHTML = `
              <h2>${data.location.name}, ${data.location.country}</h2>
              <p><strong>${data.current.condition.text}</strong></p>
              <img src="${data.current.condition.icon}" alt="weather icon">
              <p>🌡️ Temp: ${data.current.temp_c} °C</p>
              <p>💧 Humidity: ${data.current.humidity}%</p>
              <p>🌬️ Wind: ${data.current.wind_kph} kph</p>
              <p>🌫️ Air Quality Index: ${data.current.air_quality.pm2_5.toFixed(2)}</p>
            `;
          } else {
            box.innerHTML = `<p>City not found!</p>`;
          }
        })
        .catch(() => {
          document.getElementById("weatherBox").innerHTML = `<p>Error fetching data</p>`;
        });
    }

    function makeRain() {
      for (let i = 0; i < 120; i++) {
        const drop = document.createElement('div');
        drop.classList.add('raindrop');
        drop.style.left = Math.random() * window.innerWidth + 'px';
        drop.style.animationDuration = (Math.random() * 2 + 2) + 's';
        document.body.appendChild(drop);
      }
    }

    makeRain();
  </script>
</body>
</html>
